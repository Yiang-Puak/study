# AI 面试冲刺手册 —— MkDocs Material 站点配置
# 使用: mkdocs serve (本地预览) / mkdocs gh-deploy (手动部署)
# GitHub Actions 会自动部署，无需手动操作
# MkDocs 配置文件
# docs_dir 指向 docs/ 目录（MkDocs 标准结构）

site_name: AI Agent 工程学习手册
site_description: AI Agent、Python 与面试真题训练材料
site_author: AI Interview Study Notes
copyright: Copyright &copy; 2026 AI Interview Study Notes

docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs            # 顶部标签导航
    - navigation.sections        # 章节折叠
    - navigation.expand          # 默认展开导航
    - navigation.indexes         # 章节索引页
    - search.suggest             # 搜索建议
    - search.highlight           # 高亮搜索结果
    - content.code.copy          # 代码块复制按钮
    - content.code.annotate      # 代码注释

plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
  - stylesheets/advanced.css

